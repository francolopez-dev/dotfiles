start-at-login = true

after-login-command = []
after-startup-command = [
  'exec-and-forget /bin/bash -lc "~/.config/borders/bordersrc"'
]
# Notify Sketchybar about workspace change
exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]


enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
automatically-unhide-macos-hidden-apps = false
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

[key-mapping]
preset = 'qwerty'

[gaps]
inner.horizontal = 5
inner.vertical = 5
outer.left = 5
outer.right = 5
outer.top = 5
outer.bottom = 5


[workspace-to-monitor-force-assignment]
'C_Work' = 'Built-in Retina Display'       # Communication
'Email' = 'Built-in Retina Display'        # Personal & Work (Outlook-Thunderbird)
'I_Ai-Tools' = 'Built-in Retina Display'   # AI tools (ChatGPT)
'w' = 'Built-in Retina Display'            # extra left 1
'x' = 'Built-in Retina Display'            # extra left 2 
'y' = 'Built-in Retina Display'            # extra left 3
'z' = 'Built-in Retina Display'            # extra left 4
'P_Safari' = 'LU28R55'                     # Browser Personal
'B_Work' = 'LU28R55'                        # Firefox / Chrome / Dev
'Dev' = 'LU28R55'                           # Firefox / Chrome / Dev
'T_Tools' = 'LU28R55'                       # Docker, GitHub, Transmit
'X_Terminal' = 'LU28R55'                    # Terminal fullscreen
'Y_Main-extra' = 'LU28R55'                  # extra 1
'U_Sec-Extra' = 'LU28R55'                   # extra 2

[mode.main.binding]
cmd-h = [] # Disable "hide application"
cmd-alt-h = [] # Disable "hide others"
# Window navigation
ctrl-h = 'focus left'
ctrl-j = 'focus down'
ctrl-k = 'focus up'
ctrl-l = 'focus right'

# Move windows
alt-ctrl-h = 'move left'
alt-ctrl-j = 'move down'
alt-ctrl-k = 'move up'
alt-ctrl-l = 'move right'

# Resize
ctrl-minus = 'resize smart -50'
ctrl-equal = 'resize smart +50'


# Workspace Switching (Alt + Key)
ctrl-cmd-1 = 'workspace C_Work'
ctrl-cmd-2 = 'workspace Email'
ctrl-cmd-3 = 'workspace I_Ai-Tools'
ctrl-cmd-4 = 'workspace w'
ctrl-cmd-5 = 'workspace x'
ctrl-cmd-6 = 'workspace y'
ctrl-cmd-7 = 'workspace z'

ctrl-1 = 'workspace B_Work'
ctrl-2 = 'workspace P_Safari'
ctrl-3 = 'workspace Dev'
ctrl-4 = 'workspace T_Tools'
ctrl-5 = 'workspace X_Terminal'
ctrl-6 = 'workspace Y_Main-extra'
ctrl-7 = 'workspace U_Sec-Extra'

# Move Window to Workspace (Alt + Shift + Key)
ctrl-shift-cmd-1 = 'move-node-to-workspace C_Work --focus-follows-window'
ctrl-shift-cmd-2 = 'move-node-to-workspace Email --focus-follows-window'
ctrl-shift-cmd-3 = 'move-node-to-workspace I_Ai-Tools --focus-follows-window'
ctrl-shift-cmd-4 = 'move-node-to-workspace w --focus-follows-window'
ctrl-shift-cmd-5 = 'move-node-to-workspace x --focus-follows-window'
ctrl-shift-cmd-6 = 'move-node-to-workspace y --focus-follows-window'
ctrl-shift-cmd-7 = 'move-node-to-workspace z --focus-follows-window'

ctrl-shift-1 = 'move-node-to-workspace B_Work --focus-follows-window'
ctrl-shift-2 = 'move-node-to-workspace P_Safari --focus-follows-window'
ctrl-shift-3 = 'move-node-to-workspace Dev --focus-follows-window'
ctrl-shift-4 = 'move-node-to-workspace T_Tools --focus-follows-window'
ctrl-shift-5 = 'move-node-to-workspace X_Terminal --focus-follows-window'
ctrl-shift-6 = 'move-node-to-workspace Y_Main-extra --focus-follows-window'
ctrl-shift-7 = 'move-node-to-workspace U_Sec-Extra --focus-follows-window'

alt-tab = 'workspace-back-and-forth'

# App Launchers
# alt-enter = 'exec-and-forget open -a "kitty"'
alt-shift-enter = 'exec-and-forget open -n /Applications/Alacritty.app'
alt-enter = 'exec-and-forget open -n /Applications/WezTerm.app'
alt-semicolon = """exec-and-forget open -a "System Settings" """
alt-t = 'exec-and-forget open -n /Applications/Microsoft\ Teams.app'
alt-r = 'exec-and-forget open -a "Reminders"'
alt-f = 'exec-and-forget open -a Finder'
alt-e = 'exec-and-forget open -n /Applications/Microsoft\ Outlook.app'
alt-g = 'exec-and-forget open -n /Applications/ChatGPT.app'

# # Browsers
alt-b = 'exec-and-forget open -a Firefox'
alt-shift-b = 'exec-and-forget open -a Safari'
# alt-g = 'exec-and-forget open -a "Google Chrome"'

