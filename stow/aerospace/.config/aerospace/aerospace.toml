# Layout & Monitor
ctrl-shift-z = 'layout floating tiling'
alt-shift-z = 'flatten-workspace-tree'
# Move window to next monitor 
ctrl-shift-h = 'move-node-to-monitor --wrap-around next --focus-follows-window'
ctrl-shift-l = 'move-node-to-monitor --wrap-around prev --focus-follows-window'

# alt-shift-w = "move-node-to-monitor --wrap-around prev --focus-follows-window"

# Mode Switching
# alt-backspace = 'mode service'
# alt-esc = 'mode apps'
# alt-0 = "mode apps"

# Config reload
ctrl-alt-r = "reload-config"


